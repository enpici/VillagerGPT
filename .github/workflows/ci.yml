name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Clean build and static checks
        run: mvn -B clean verify

      - name: Plugin conversation command/state tests
        run: mvn -B -Dtest='*CommandFlowMockBukkitTest,*VillagerConversationManagerStateTest,*ConversationEventsHandlerTest' test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: villagergpt-jar
          path: target/*.jar
          if-no-files-found: error
