name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Clean build and tests (multi-module)
        run: mvn -B clean verify

      - name: Plugin conversation command/state tests
        run: mvn -B -pl villagergpt-plugin -Dtest='*CommandFlowMockBukkitTest,*VillagerConversationManagerStateTest,*ConversationEventsHandlerTest' test

      - name: VillagerLife blueprint/build task tests
        run: mvn -B -pl villagerlife-plugin -am -Dtest='*BlueprintMetadataLoadTest,*BuildPlanSelectionTest,*BuildStructureTaskStateTransitionTest,*BlueprintWorldEditFallbackRegressionTest' test

      - name: Upload VillagerGPT JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: villagergpt-plugin-jar
          path: villagergpt-plugin/target/*.jar
          if-no-files-found: error

      - name: Upload VillagerLife JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: villagerlife-plugin-jar
          path: villagerlife-plugin/target/*.jar
          if-no-files-found: error
