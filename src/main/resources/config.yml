# Use "openai" to talk to the OpenAI API or "local" to use a locally hosted model.
provider: "openai"

# Environment variable that stores your OpenAI API key.
# Example: export OPENAI_API_KEY="..."
openai-key-env-var: "OPENAI_API_KEY"

# If you still use openai-key in config, it's treated as legacy fallback.
openai-key: ""

# If you have GPT-4 access, it is highly recommended to use it here.
openai-model: "gpt-3.5-turbo"

# URL for your locally hosted model's endpoint.
local-model-url: "http://localhost:8000/"
# Send conversation to the local model as JSON instead of plain text
local-model-json: false

# Timeouts, retries and fallback text used by all providers
provider-settings:
  connection-timeout-ms: 5000
  response-timeout-ms: 30000
  retry:
    max-attempts: 3
    base-delay-ms: 500
    max-delay-ms: 4000
  fallback-message: "No pude responder ahora mismo. Inténtalo de nuevo en unos segundos."

# Controls to reduce abuse and runaway session cost
safety:
  # Min interval between messages from same player in a conversation
  player-cooldown-ms: 1500
  # Max characters accepted in one player input
  max-input-length: 280
  # Session message budget per conversation
  session-max-player-messages: 24
  # Session character budget per conversation
  session-max-player-chars: 6000

# Log conversation messages to server console, useful for catching abuse
log-conversations: true

logging:
  level: "INFO"
  context-level: "INFO"
  summary-level: "INFO"
  summary-interval-ticks: 1200

# Either "system" or "user"; configures the type of message the "preamble" will be.
preamble-message-type: user

memory:
  db-path: memory.db
  max-messages: 20

gossip:
  radius: 10
  max-entries: 30

environment:
  environment-radius: 5
  interval: 20

villagers-aware-during-conversation: false
