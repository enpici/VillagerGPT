name: VillagerLife
version: ${project.version}
main: io.github.enpici.villager.life.VillagerLifePlugin
api-version: '1.21'
description: Villager autonomous simulation plugin for the Villager suite.
commands:
  villagerlife:
    description: Administration command for VillagerLife
    usage: /villagerlife <createvillage|register|debug|setrole|build|status>
    permission: villagerlife.admin
permissions:
  villagerlife.admin:
    description: Allows administrative usage of VillagerLife commands
    default: op
